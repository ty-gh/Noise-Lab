<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <meta name="theme-color" content="#f0f0f0" />
        <title>防音窓実験室 Noise Lab</title>
        <style>
            :root {
                --bg: #f0f0f0;
                --text: #333;
                --muted: #666;
                --shadow-dark: #d0d0d0;
                --shadow-light: #ffffff;
                --accent: #3a86ff;
                --ok: #33c27f;
                --ng: #ff5a5f;
                --card-radius: 18px;
                --btn-radius: 16px;
                --shadow-lg: 14px;
                --shadow-md: 10px;
                --shadow-sm: 6px;
                
                /* 音源別カラーパレット */
                --voice-base: #ff6b6b;
                --voice-active: #ff5252;
                --voice-glow: rgba(255, 107, 107, 0.4);
                
                --tv-base: #4ecdc4;
                --tv-active: #26a69a;
                --tv-glow: rgba(78, 205, 196, 0.4);
                
                --construction-base: #ffa726;
                --construction-active: #ff9800;
                --construction-glow: rgba(255, 167, 38, 0.4);
                
                --laundry-base: #ab47bc;
                --laundry-active: #9c27b0;
                --laundry-glow: rgba(171, 71, 188, 0.4);
                
                --rain-base: #42a5f5;
                --rain-active: #2196f3;
                --rain-glow: rgba(66, 165, 245, 0.4);
                
                --traffic-base: #66bb6a;
                --traffic-active: #4caf50;
                --traffic-glow: rgba(102, 187, 106, 0.4);
                
                /* 動的カラー変数（JavaScriptで更新） */
                --dynamic-button-bg: var(--bg);
                --dynamic-button-shadow: var(--shadow-dark);
                --dynamic-glow-opacity: 0;
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
                background: var(--bg);
                color: var(--text);
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Hiragino Sans", "Noto Sans JP", "Helvetica Neue", Arial,
                    "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol",
                    sans-serif;
                -webkit-font-smoothing: antialiased;
                text-rendering: optimizeLegibility;
            }

            /* Neumorphism */
            .nm-raised {
                background: var(--bg);
                border-radius: var(--card-radius);
                box-shadow:
                    var(--shadow-lg) var(--shadow-lg)
                        calc(var(--shadow-lg) * 1.5) var(--shadow-dark),
                    calc(var(--shadow-lg) * -1) calc(var(--shadow-lg) * -1)
                        calc(var(--shadow-lg) * 1.5) var(--shadow-light);
            }
            .nm-inset {
                background: var(--bg);
                border-radius: var(--card-radius);
                box-shadow:
                    inset var(--shadow-md) var(--shadow-md)
                        calc(var(--shadow-md) * 1.6) var(--shadow-dark),
                    inset calc(var(--shadow-md) * -1)
                        calc(var(--shadow-md) * -1) calc(var(--shadow-md) * 1.6)
                        var(--shadow-light);
            }
            .chip {
                font-size: 12px;
                color: var(--muted);
                padding: 7px 10px;
                border-radius: 999px;
                background: var(--bg);
                box-shadow:
                    6px 6px 12px var(--shadow-dark),
                    -6px -6px 12px var(--shadow-light);
                line-height: 1;
            }

            /* App frame */
            .app {
                min-height: 100svh;
                max-width: 1200px;
                margin: 0 auto;
                display: grid;
                grid-template-rows: auto auto 1fr auto;
                gap: 14px;
                padding: 16px 16px 10px;
            }

            /* Header: title + compact BT */
            .topbar {
                display: flex;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
            }
            .topbar h1 {
                margin: 0;
                font-size: 20px;
                font-weight: 700;
                letter-spacing: 0.2px;
                text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.8);
            }
            .topbar .spacer {
                flex: 1 1 auto;
            }
            .bt-chip {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 6px 8px;
                border-radius: 999px;
                background: var(--bg);
                box-shadow:
                    6px 6px 12px var(--shadow-dark),
                    -6px -6px 12px var(--shadow-light);
                color: var(--muted);
                white-space: nowrap;
                line-height: 1;
            }
            .bt-chip .dot {
                width: 9px;
                height: 9px;
                border-radius: 50%;
                box-shadow:
                    inset 2px 2px 4px rgba(0, 0, 0, 0.08),
                    inset -2px -2px 4px rgba(255, 255, 255, 0.8),
                    0 0 0 2px rgba(0, 0, 0, 0.03);
            }
            .bt-chip .dot.ok {
                background: radial-gradient(
                    circle at 30% 30%,
                    #b8ffd8,
                    #33c27f
                );
            }
            .bt-chip .dot.ng {
                background: radial-gradient(
                    circle at 30% 30%,
                    #ffd8d8,
                    #ff5a5f
                );
            }
            .bt-chip .lbl {
                font-size: 12px;
                font-weight: 600;
                color: #333;
            }
            .bt-chip .btn {
                appearance: none;
                border: 0;
                background: linear-gradient(145deg, #f5f5f5, #e8e8e8);
                border-radius: 999px;
                padding: 5px 8px;
                font-size: 12px;
                font-weight: 600;
                color: #333;
                cursor: pointer;
                box-shadow:
                    var(--shadow-sm) var(--shadow-sm) var(--shadow-md)
                        var(--shadow-dark),
                    calc(var(--shadow-sm) * -1) calc(var(--shadow-sm) * -1)
                        var(--shadow-md) var(--shadow-light);
            }
            .bt-chip .btn:active {
                box-shadow:
                    inset var(--shadow-sm) var(--shadow-sm)
                        calc(var(--shadow-sm) * 1.4) var(--shadow-dark),
                    inset calc(var(--shadow-sm) * -1)
                        calc(var(--shadow-sm) * -1) calc(var(--shadow-sm) * 1.4)
                        var(--shadow-light);
            }
            .bt-chip .btn:focus-visible {
                outline: 2px solid rgba(58, 134, 255, 0.75);
                outline-offset: 2px;
            }


            /* Sound panel (main 7割)。影崩れ防止のため十分な内側余白を確保 */
            .sound-panel {
                padding: 12px;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }
            .sound-scroll {
                overflow: auto;
                padding: 20px; /* より余裕のある余白でグロー効果も考慮 */
            }
            .grid {
                display: grid;
                gap: 20px;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                align-items: start;
            }

            /* ボタン: ニューモルフィック + 動的色変化対応 */
            .nm-btn {
                appearance: none;
                border: none;
                width: 100%;
                background: var(--dynamic-button-bg);
                border-radius: var(--btn-radius);
                box-shadow:
                    8px 8px 16px var(--dynamic-button-shadow),
                    -8px -8px 16px var(--shadow-light);
                padding: 16px;
                cursor: pointer;
                color: var(--text);
                text-align: center;
                transition: 
                    box-shadow 0.15s ease,
                    background-color 0.3s ease,
                    transform 0.15s ease;
                aspect-ratio: 1;
                min-height: 0;
                position: relative;
                overflow: hidden;
            }
            
            /* 音源別の基本色設定 */
            .nm-btn[data-sound="voice"] {
                --sound-base: var(--voice-base);
                --sound-active: var(--voice-active);
                --sound-glow: var(--voice-glow);
            }
            .nm-btn[data-sound="tv"] {
                --sound-base: var(--tv-base);
                --sound-active: var(--tv-active);
                --sound-glow: var(--tv-glow);
            }
            .nm-btn[data-sound="construction"] {
                --sound-base: var(--construction-base);
                --sound-active: var(--construction-active);
                --sound-glow: var(--construction-glow);
            }
            .nm-btn[data-sound="laundry"] {
                --sound-base: var(--laundry-base);
                --sound-active: var(--laundry-active);
                --sound-glow: var(--laundry-glow);
            }
            .nm-btn[data-sound="rain"] {
                --sound-base: var(--rain-base);
                --sound-active: var(--rain-active);
                --sound-glow: var(--rain-glow);
            }
            .nm-btn[data-sound="traffic"] {
                --sound-base: var(--traffic-base);
                --sound-active: var(--traffic-active);
                --sound-glow: var(--traffic-glow);
            }
            
            /* 再生状態時の色変化とグロー効果（強化版） */
            .nm-btn.is-active {
                background: linear-gradient(145deg, 
                    color-mix(in srgb, var(--sound-base) 20%, var(--bg) 80%), 
                    color-mix(in srgb, var(--sound-active) 15%, var(--bg) 85%));
                box-shadow:
                    inset 6px 6px 12px var(--shadow-dark),
                    inset -6px -6px 12px var(--shadow-light),
                    0 0 30px var(--sound-glow),
                    0 0 60px color-mix(in srgb, var(--sound-glow) 50%, transparent);
                animation: pulse-glow 2s ease-in-out infinite;
            }
            
            /* 音量連動グロー */
            .nm-btn.is-active::before {
                content: '';
                position: absolute;
                top: -2px;
                left: -2px;
                right: -2px;
                bottom: -2px;
                background: radial-gradient(circle, var(--sound-glow), transparent 70%);
                border-radius: var(--btn-radius);
                opacity: var(--dynamic-glow-opacity);
                z-index: -2;
                transition: opacity 0.1s ease;
            }
            
            /* オーラ効果（再生中の光の輪） */
            .nm-btn.is-active::after {
                content: '';
                position: absolute;
                top: -15px;
                left: -15px;
                right: -15px;
                bottom: -15px;
                border: 3px solid var(--sound-base);
                border-radius: calc(var(--btn-radius) + 12px);
                opacity: 0.6;
                z-index: -1;
                animation: pulse-aura 2.5s ease-in-out infinite;
                box-shadow: 0 0 15px var(--sound-glow);
            }
            
            /* リップル効果の基本構造 */
            .ripple-container {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                border-radius: var(--btn-radius);
                overflow: hidden;
                pointer-events: none;
                z-index: 1;
            }
            
            .ripple {
                position: absolute;
                background: radial-gradient(circle, var(--sound-base), transparent 70%);
                border-radius: 50%;
                transform: scale(0);
                animation: ripple-animation 0.6s ease-out forwards;
                pointer-events: none;
            }
            
            /* アニメーション定義 */
            @keyframes pulse-aura {
                0%, 100% {
                    transform: scale(1);
                    opacity: 0.4;
                    box-shadow: 0 0 10px var(--sound-glow);
                }
                50% {
                    transform: scale(1.15);
                    opacity: 0.8;
                    box-shadow: 0 0 25px var(--sound-glow);
                }
            }
            
            @keyframes pulse-glow {
                0%, 100% {
                    box-shadow:
                        inset 6px 6px 12px var(--shadow-dark),
                        inset -6px -6px 12px var(--shadow-light),
                        0 0 30px var(--sound-glow),
                        0 0 60px color-mix(in srgb, var(--sound-glow) 30%, transparent);
                }
                50% {
                    box-shadow:
                        inset 6px 6px 12px var(--shadow-dark),
                        inset -6px -6px 12px var(--shadow-light),
                        0 0 40px var(--sound-glow),
                        0 0 80px color-mix(in srgb, var(--sound-glow) 60%, transparent);
                }
            }
            
            @keyframes ripple-animation {
                0% {
                    transform: scale(0);
                    opacity: 1;
                }
                50% {
                    opacity: 0.6;
                }
                100% {
                    transform: scale(2.5);
                    opacity: 0;
                }
            }
            
            /* タッチ時の物理的押し込み効果 */
            .nm-btn:active,
            .nm-btn.touching {
                transform: scale(0.96) translateZ(0);
                box-shadow:
                    inset 8px 8px 16px var(--shadow-dark),
                    inset -8px -8px 16px var(--shadow-light),
                    0 0 0 rgba(0,0,0,0); /* 外側の影を削除で押し込み感 */
                transition-duration: 0.1s; /* より素早い反応 */
            }
            
            /* 通常状態への復帰時のスムーズな戻り */
            .nm-btn:not(:active):not(.touching) {
                transition-duration: 0.2s; /* 戻りは少しゆっくり */
            }
            
            /* 再生中ボタンの特別な押し込み効果 */
            .nm-btn.is-active:active,
            .nm-btn.is-active.touching {
                transform: scale(0.94) translateZ(0);
                box-shadow:
                    inset 10px 10px 20px var(--shadow-dark),
                    inset -10px -10px 20px var(--shadow-light),
                    0 0 8px var(--sound-glow); /* 再生中は薄いグローを残す */
            }
            
            .nm-btn:focus-visible {
                outline: 2px solid rgba(58, 134, 255, 0.75);
                outline-offset: 3px;
                border-radius: 14px;
            }

            .sound-btn {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                gap: 6px;
            }
            .sound-btn .icon {
                width: 56px;
                height: 56px;
                display: grid;
                place-items: center;
                font-size: 36px;
                line-height: 1;
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center;
                border-radius: 10px;
                background-color: transparent;
                opacity: 0.85;
                transition: opacity 0.2s ease;
            }
            
            .nm-btn:hover .icon,
            .nm-btn.is-active .icon {
                opacity: 1;
            }
            
            /* 各音声種別のアイコン画像 */
            .sound-btn .icon[data-sound="voice"] {
                background-image: url('images/voice.png');
            }
            .sound-btn .icon[data-sound="tv"] {
                background-image: url('images/tv.png');
            }
            .sound-btn .icon[data-sound="construction"] {
                background-image: url('images/construction.png');
            }
            .sound-btn .icon[data-sound="laundry"] {
                background-image: url('images/laundry.png');
            }
            .sound-btn .icon[data-sound="rain"] {
                background-image: url('images/rain.png');
            }
            .sound-btn .icon[data-sound="traffic"] {
                background-image: url('images/traffic.png');
            }
            
            /* 画像読み込み失敗時のフォールバック（絵文字） */
            .sound-btn .icon[data-sound="voice"]:after {
                content: "💬";
            }
            .sound-btn .icon[data-sound="tv"]:after {
                content: "📺";
            }
            .sound-btn .icon[data-sound="construction"]:after {
                content: "🚧";
            }
            .sound-btn .icon[data-sound="laundry"]:after {
                content: "🧺";
            }
            .sound-btn .icon[data-sound="rain"]:after {
                content: "🌧️";
            }
            .sound-btn .icon[data-sound="traffic"]:after {
                content: "🚗";
            }
            
            /* 画像が正常に読み込まれた場合は絵文字を非表示 */
            .sound-btn .icon[data-sound]:after {
                position: absolute;
                font-size: 32px;
                opacity: 0;
                z-index: -1;
                transition: opacity 0.2s ease;
            }
            .sound-btn .text {
                display: flex;
                flex-direction: column;
                justify-content: center;
                min-width: 0;
                gap: 4px;
            }
            .sound-btn .title {
                font-weight: 700;
                line-height: 1.2;
                font-size: 14px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            /* 各ボタン内の波形表示領域（強化版） */
            .sound-btn .mini-wave {
                width: 100%;
                height: 28px;
                border-radius: 10px;
                background: var(--bg);
                box-shadow:
                    inset 4px 4px 8px var(--shadow-dark),
                    inset -4px -4px 8px var(--shadow-light);
                overflow: hidden;
                position: relative;
                opacity: 0;
                transition: 
                    opacity 0.4s ease,
                    height 0.3s ease,
                    box-shadow 0.3s ease;
            }
            
            .nm-btn.is-active .mini-wave {
                opacity: 1;
                height: 32px;
                box-shadow:
                    inset 4px 4px 8px var(--shadow-dark),
                    inset -4px -4px 8px var(--shadow-light),
                    0 0 8px var(--sound-glow);
            }
            
            .mini-wave canvas {
                width: 100%;
                height: 100%;
                display: block;
                border-radius: 8px;
            }
            
            /* dB値のオーバーレイ表示（ボタンの右上角） */
            .db-overlay {
                position: absolute;
                top: 4px;
                right: 4px;
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.98);
                background: rgba(0, 0, 0, 0.6);
                padding: 4px 8px;
                border-radius: 8px;
                backdrop-filter: blur(4px);
                opacity: 0;
                transition: opacity 0.3s ease;
                pointer-events: none;
                z-index: 3;
                min-width: 40px;
                text-align: center;
                line-height: 1.2;
                text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
                border: 1px solid rgba(255, 255, 255, 0.15);
                box-shadow: 
                    0 3px 6px rgba(0, 0, 0, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
            
            /* 再生中のみdB値を表示 */
            .nm-btn.is-active .db-overlay {
                opacity: 1;
            }
            
            /* 音源別のdB表示色調整（各音源の特徴色を活用） */
            .nm-btn[data-sound="voice"].is-active .db-overlay {
                background: linear-gradient(135deg, rgba(255, 107, 107, 0.85), rgba(255, 107, 107, 0.65));
                border-color: rgba(255, 107, 107, 0.4);
                box-shadow: 
                    0 3px 8px rgba(255, 107, 107, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }
            .nm-btn[data-sound="tv"].is-active .db-overlay {
                background: linear-gradient(135deg, rgba(78, 205, 196, 0.85), rgba(78, 205, 196, 0.65));
                border-color: rgba(78, 205, 196, 0.4);
                box-shadow: 
                    0 3px 8px rgba(78, 205, 196, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }
            .nm-btn[data-sound="construction"].is-active .db-overlay {
                background: linear-gradient(135deg, rgba(255, 167, 38, 0.85), rgba(255, 167, 38, 0.65));
                border-color: rgba(255, 167, 38, 0.4);
                box-shadow: 
                    0 3px 8px rgba(255, 167, 38, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }
            .nm-btn[data-sound="laundry"].is-active .db-overlay {
                background: linear-gradient(135deg, rgba(171, 71, 188, 0.85), rgba(171, 71, 188, 0.65));
                border-color: rgba(171, 71, 188, 0.4);
                box-shadow: 
                    0 3px 8px rgba(171, 71, 188, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }
            .nm-btn[data-sound="rain"].is-active .db-overlay {
                background: linear-gradient(135deg, rgba(66, 165, 245, 0.85), rgba(66, 165, 245, 0.65));
                border-color: rgba(66, 165, 245, 0.4);
                box-shadow: 
                    0 3px 8px rgba(66, 165, 245, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }
            .nm-btn[data-sound="traffic"].is-active .db-overlay {
                background: linear-gradient(135deg, rgba(102, 187, 106, 0.85), rgba(102, 187, 106, 0.65));
                border-color: rgba(102, 187, 106, 0.4);
                box-shadow: 
                    0 3px 8px rgba(102, 187, 106, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }

            footer.note {
                font-size: 11px;
                color: var(--muted);
                text-align: center;
                padding-bottom: 6px;
            }
            /* アクセシビリティ: アニメーション無効化設定時の配慮 */
            @media (prefers-reduced-motion: reduce) {
                .nm-btn {
                    transition: none;
                }
                .nm-btn:active,
                .nm-btn.touching {
                    transform: scale(0.98); /* 軽微な変化のみ残す */
                    transition: none;
                }
                .nm-btn.is-active::after {
                    animation: none; /* オーラアニメーション無効化 */
                }
                .ripple {
                    animation: none; /* リップルアニメーション無効化 */
                }
                .sound-btn .icon {
                    transition: none;
                }
                .sound-btn .icon[data-sound]:after {
                    transition: none;
                }
                .sound-btn .mini-wave {
                    transition: none;
                }
            }
            
            /* 高コントラストモード対応 */
            @media (prefers-contrast: high) {
                .nm-btn:active,
                .nm-btn.touching {
                    outline: 2px solid;
                    outline-offset: -2px;
                }
            }
            
            /* モバイル・タブレット向けサイズ調整 */
            @media (max-width: 480px) {
                .grid {
                    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                    gap: 12px;
                }
                .nm-btn {
                    padding: 12px;
                }
                .sound-btn .icon {
                    width: 44px;
                    height: 44px;
                    background-size: contain;
                }
                .sound-btn .icon[data-sound]:after {
                    font-size: 26px;
                }
                .sound-btn .title {
                    font-size: 12px;
                }
                .sound-btn .mini-wave {
                    height: 12px; /* モバイルでは波形を小さく */
                }
                
                /* モバイルでのdB表示サイズ調整 */
                .db-overlay {
                    font-size: 11px;
                    padding: 3px 6px;
                    min-width: 36px;
                    top: 3px;
                    right: 3px;
                }
            }
            
            /* タブレット向け最適化 */
            @media (min-width: 768px) and (max-width: 1024px) {
                .sound-btn .icon {
                    width: 52px;
                    height: 52px;
                }
                .sound-btn .icon[data-sound]:after {
                    font-size: 30px;
                }
                .sound-btn .mini-wave {
                    height: 30px; /* タブレットでは波形を大きく */
                }
                .nm-btn.is-active .mini-wave {
                    height: 36px;
                }
                .grid {
                    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                    gap: 24px;
                }
                .sound-scroll {
                    padding: 24px;

    <body>

        <script>
            // Audio + Analyzer
            let audioCtx;
            let masterGain, analyser, dest, mediaOutEl;
            let audioBuffers = {};
            
            // 複数音源同時再生管理
            let activeSounds = new Map(); // soundName -> { stopFn, gainNode, sourceNode, analyser }
            
            // 個別音源の波形表示管理
            let miniWaveCanvases = new Map(); // soundName -> { canvas, ctx, dataArray }
            let miniWaveData = new Map(); // soundName -> frequencyData
            
            // 個別音源のdB表示管理
            let dbDisplayElements = new Map(); // soundName -> dbElement
            
            // 継続的波紋効果管理
            let continuousRipples = new Map(); // soundName -> intervalId

            function ensureAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext ||
                    window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.9;

                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.85;

                masterGain.connect(analyser);

                dest = audioCtx.createMediaStreamDestination();
                analyser.connect(dest);
                mediaOutEl = new Audio();
                mediaOutEl.autoplay = true;
                mediaOutEl.srcObject = dest.stream;
                mediaOutEl.play().catch(() => {});
            }

            async function loadAudioFile(url) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const arrayBuffer = await response.arrayBuffer();
                    return await audioCtx.decodeAudioData(arrayBuffer);
                } catch (error) {
                    console.error(`音声ファイルの読み込みに失敗: ${url}`, error);
                    return null;
                }
            }

            async function preloadAudioFiles() {
                const sounds = ['voice', 'tv', 'construction', 'laundry', 'rain', 'traffic'];
                const promises = sounds.map(async (sound) => {
                    const buffer = await loadAudioFile(`sounds/${sound}.mp3`);
                    if (buffer) audioBuffers[sound] = buffer;
                });
                await Promise.all(promises);
            }

            function makeBufferSource(buffer, loop = true) {
                const src = audioCtx.createBufferSource();
                src.buffer = buffer;
                src.loop = loop;
                return src;
            }

            // 音声ファイル再生（個別音源解析対応）
            function buildFromAudioFile(soundName) {
                const buffer = audioBuffers[soundName];
                if (!buffer) {
                    console.error(`音声ファイルが見つかりません: ${soundName}`);
                    return null;
                }
                
                const src = makeBufferSource(buffer, true);
                const gain = audioCtx.createGain();
                gain.gain.value = 0.7;
                
                // 個別音源用のアナライザー作成
                const soundAnalyser = audioCtx.createAnalyser();
                soundAnalyser.fftSize = 512; // ミニ波形用に軽量化
                soundAnalyser.smoothingTimeConstant = 0.8;
                
                // 接続: src -> gain -> [analyser, masterGain]
                src.connect(gain);
                gain.connect(soundAnalyser);
                gain.connect(masterGain);
                
                src.start();
                
                const stopFn = () => {
                    try {
                        src.stop();
                        src.disconnect();
                        gain.disconnect();
                        soundAnalyser.disconnect();
                    } catch (e) {}
                };
                
                return {
                    stopFn: stopFn,
                    gainNode: gain,
                    sourceNode: src,
                    analyser: soundAnalyser
                };
            }

            const SOUND_BUILDERS = {
                voice: () => buildFromAudioFile('voice'),
                tv: () => buildFromAudioFile('tv'),
                construction: () => buildFromAudioFile('construction'),
                laundry: () => buildFromAudioFile('laundry'),
                rain: () => buildFromAudioFile('rain'),
                traffic: () => buildFromAudioFile('traffic'),
            };

            // 複数音源対応の新しい再生/停止関数
            async function startSound(kind) {
                ensureAudio();
                audioCtx.resume();
                
                // 音声ファイルがまだ読み込まれていない場合は読み込む
                if (Object.keys(audioBuffers).length === 0) {
                    await preloadAudioFiles();
                }
                
                const builder = SOUND_BUILDERS[kind];
                if (!builder) {
                    console.error(`不明な音声種別: ${kind}`);
                    return false;
                }
                
                // 音声ファイルが見つからない場合の警告
                if (!audioBuffers[kind]) {
                    alert(`音声ファイル "${kind}.mp3" が見つかりません。soundsフォルダにファイルが存在することを確認してください。`);
                    return false;
                }
                
                const soundInstance = builder();
                if (soundInstance) {
                    activeSounds.set(kind, soundInstance);
                    return true;
                }
                return false;
            }
            
            function stopSound(kind) {
                if (kind) {
                    // 特定の音源を停止
                    const soundInstance = activeSounds.get(kind);
                    if (soundInstance) {
                        soundInstance.stopFn();
                        activeSounds.delete(kind);
                    }
                } else {
                    // 全ての音源を停止（既存の挙動維持）
                    activeSounds.forEach((soundInstance) => {
                        soundInstance.stopFn();
                    });
                    activeSounds.clear();
                }
            }
            
            function isSoundPlaying(kind) {
                return activeSounds.has(kind);
            }
            
            // 音量調整機能
            function setSoundVolume(kind, volume) {
                const soundInstance = activeSounds.get(kind);
                if (soundInstance && soundInstance.gainNode) {
                    soundInstance.gainNode.gain.value = Math.max(0, Math.min(1, volume));
                }
            }
            
            function setMasterVolume(volume) {
                if (masterGain) {
                    masterGain.gain.value = Math.max(0, Math.min(1, volume));
                }
            }
            
            // 現在再生中の音源一覧を取得
            function getActiveSounds() {
                return Array.from(activeSounds.keys());
            }
            
            // 動的色変化システム
            let soundVolumeData = new Map(); // soundName -> volumeLevel
            
            function updateButtonColors() {
                if (!analyser) return;
                
                // 全体の音量を取得
                const timeArr = new Float32Array(analyser.fftSize);
                analyser.getFloatTimeDomainData(timeArr);
                let sum = 0;
                for (let i = 0; i < timeArr.length; i++) {
                    sum += timeArr[i] * timeArr[i];
                }
                const rms = Math.sqrt(sum / timeArr.length) || 1e-9;
                const dbfs = 20 * Math.log10(rms);
                
                // 音量を0-1の範囲に正規化（-60dBFS ～ 0dBFS）
                const normalizedVolume = Math.max(0, Math.min(1, (dbfs + 60) / 60));
                
                // 再生中の各ボタンに色変化を適用
                btns.forEach((btn) => {
                    const soundName = btn.dataset.sound;
                    const isActive = btn.classList.contains('is-active');
                    
                    if (isActive) {
                        // 音量に応じたグロー強度（0.1 ～ 0.8）
                        const glowIntensity = 0.1 + (normalizedVolume * 0.7);
                        
                        // ボタン個別のCSS変数を更新
                        btn.style.setProperty('--dynamic-glow-opacity', glowIntensity);
                        
                        // 音量データを保存
                        soundVolumeData.set(soundName, normalizedVolume);
                    } else {
                        // 非アクティブ時はグローを無効化
                        btn.style.setProperty('--dynamic-glow-opacity', '0');
                        soundVolumeData.delete(soundName);
                    }
                });
            }
            
            function setSoundColorTheme(soundName, intensity = 0.5) {
                const btn = document.querySelector(`[data-sound="${soundName}"]`);
                if (!btn) return;
                
                const baseIntensity = Math.max(0.1, Math.min(1, intensity));
                btn.style.setProperty('--dynamic-glow-opacity', baseIntensity);
            }
            
            // リップル効果の実装
            function createRipple(btn, event, options = {}) {
                const soundName = btn.dataset.sound;
                const soundColor = waveStyles[soundName]?.color || '#3a86ff';
                const rippleContainer = btn.querySelector('.ripple-container');
                
                if (!rippleContainer) return;
                
                const rect = btn.getBoundingClientRect();
                let x, y;
                
                if (options.randomPosition) {
                    // 中心位置（継続波紋用）
                    x = rect.width / 2;
                    y = rect.height / 2;
                } else {
                    // タッチ/クリック位置を取得
                    let clientX, clientY;
                    
                    if (event && event.type === 'touchstart' && event.touches && event.touches[0]) {
                        clientX = event.touches[0].clientX;
                        clientY = event.touches[0].clientY;
                    } else if (event && event.clientX !== undefined) {
                        clientX = event.clientX;
                        clientY = event.clientY;
                    } else {
                        // フォールバック: ボタン中央
                        clientX = rect.left + rect.width / 2;
                        clientY = rect.top + rect.height / 2;
                    }
                    
                    x = clientX - rect.left;
                    y = clientY - rect.top;
                }
                
                // リップル要素を作成
                const ripple = document.createElement('div');
                ripple.classList.add('ripple');
                
                // サイズと位置を設定
                const baseSize = Math.max(rect.width, rect.height) * 0.6;
                const size = options.size ? baseSize * options.size : baseSize;
                const opacity = options.opacity || 1;
                
                ripple.style.width = size + 'px';
                ripple.style.height = size + 'px';
                ripple.style.left = (x - size / 2) + 'px';
                ripple.style.top = (y - size / 2) + 'px';
                ripple.style.background = `radial-gradient(circle, ${soundColor}${Math.floor(170 * opacity).toString(16).padStart(2, '0')}, ${soundColor}${Math.floor(102 * opacity).toString(16).padStart(2, '0')} 40%, transparent 70%)`;
                ripple.style.border = `1px solid ${soundColor}${Math.floor(136 * opacity).toString(16).padStart(2, '0')}`;
                
                // コンテナに追加
                rippleContainer.appendChild(ripple);
                
                // アニメーション終了後に削除
                setTimeout(() => {
                    if (ripple.parentNode) {
                        ripple.parentNode.removeChild(ripple);
                    }
                }, 600);
            }
            
            // 継続的波紋効果の制御
            function startContinuousRipples(soundName) {
                const btn = document.querySelector(`[data-sound="${soundName}"]`);
                if (!btn) return;
                
                // 既存の波紋を停止
                stopContinuousRipples(soundName);
                
                // 音源特性に応じた波紋間隔を設定
                const style = waveStyles[soundName];
                let baseInterval = 1500; // 基本間隔（ミリ秒）
                
                // 音源タイプに応じて間隔調整
                switch (style?.type) {
                    case 'spikes': // 工事音
                        baseInterval = 800;
                        break;
                    case 'bars': // 話し声・交通騒音
                        baseInterval = 1200;
                        break;
                    case 'dots': // 雨音
                        baseInterval = 2000;
                        break;
                    case 'curve': // テレビ・洗濯機
                        baseInterval = 1600;
                        break;
                }
                
                const intervalId = setInterval(() => {
                    // 音量に応じた波紋の強度を計算
                    const volumeLevel = soundVolumeData.get(soundName) || 0.3;
                    const intensity = 0.3 + volumeLevel * 0.7; // 0.3-1.0の範囲
                    
                    // ランダムな変動を加える
                    const variation = 0.8 + Math.random() * 0.4; // 0.8-1.2の範囲
                    const finalIntensity = Math.min(1, intensity * variation);
                    
                    // 波紋を生成
                    createRipple(btn, null, {
                        randomPosition: true,
                        size: 0.4 + finalIntensity * 0.4, // サイズ調整
                        opacity: 0.4 + finalIntensity * 0.4 // 透明度調整
                    });
                }, baseInterval + Math.random() * 400 - 200); // ±200msのランダム変動
                
                continuousRipples.set(soundName, intervalId);
            }
            
            function stopContinuousRipples(soundName) {
                const intervalId = continuousRipples.get(soundName);
                if (intervalId) {
                    clearInterval(intervalId);
                    continuousRipples.delete(soundName);
                }
            }
            
            // オーラ効果の動的制御
            function updateAuraEffect(soundName, isActive) {
                const btn = document.querySelector(`[data-sound="${soundName}"]`);
                if (!btn) return;
                
                if (isActive) {
                    // 音源色でオーラを設定
                    const soundColor = waveStyles[soundName]?.color || '#3a86ff';
                    btn.style.setProperty('--sound-base', soundColor);
                } else {
                    // オーラを無効化
                    btn.style.removeProperty('--sound-base');
                }
            }
            
            // ミニ波形キャンバスの初期化
            function initMiniWaveCanvas(soundName) {
                const canvas = document.querySelector(`[data-wave="${soundName}"]`);
                if (!canvas) return null;
                
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                
                // キャンバスサイズを設定
                const rect = canvas.getBoundingClientRect();
                canvas.width = Math.floor(rect.width * dpr);
                canvas.height = Math.floor(rect.height * dpr);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                
                const dataArray = new Uint8Array(256); // 512 / 2
                
                const canvasData = {
                    canvas: canvas,
                    ctx: ctx,
                    dataArray: dataArray,
                    width: rect.width,
                    height: rect.height
                };
                
                miniWaveCanvases.set(soundName, canvasData);
                return canvasData;
            }
            
            // 全ミニ波形キャンバスの初期化
            function initAllMiniWaveCanvases() {
                const sounds = ['voice', 'tv', 'construction', 'laundry', 'rain', 'traffic'];
                sounds.forEach(soundName => {
                    initMiniWaveCanvas(soundName);
                });
            }
            
            // dB表示要素の初期化
            function initDBDisplayElements() {
                const sounds = ['voice', 'tv', 'construction', 'laundry', 'rain', 'traffic'];
                sounds.forEach(soundName => {
                    const dbElement = document.querySelector(`[data-db="${soundName}"]`);
                    if (dbElement) {
                        dbDisplayElements.set(soundName, dbElement);
                    }
                });
            }
            
            // 音源特性別の波形描画スタイル定義
            const waveStyles = {
                voice: {
                    type: 'bars',
                    color: '#ff6b6b',
                    intensity: 1.2,
                    smoothing: 0.7
                },
                tv: {
                    type: 'bars',
                    color: '#4ecdc4',
                    intensity: 0.8,
                    smoothing: 0.6
                },
                construction: {
                    type: 'spikes',
                    color: '#ffa726',
                    intensity: 1.5,
                    smoothing: 0.3
                },
                laundry: {
                    type: 'bars',
                    color: '#ab47bc',
                    intensity: 0.9,
                    smoothing: 0.8
                },
                rain: {
                    type: 'bars',
                    color: '#42a5f5',
                    intensity: 0.7,
                    smoothing: 0.9
                },
                traffic: {
                    type: 'bars',
                    color: '#66bb6a',
                    intensity: 1.0,
                    smoothing: 0.5
                }
            };
            
            // 個別音源のdB計算
            function calculateSoundDB(soundName) {
                const soundInstance = activeSounds.get(soundName);
                if (!soundInstance) return null;
                
                const { analyser } = soundInstance;
                const timeArr = new Float32Array(analyser.fftSize);
                analyser.getFloatTimeDomainData(timeArr);
                
                // RMS値計算
                let sum = 0;
                for (let i = 0; i < timeArr.length; i++) {
                    sum += timeArr[i] * timeArr[i];
                }
                const rms = Math.sqrt(sum / timeArr.length) || 1e-9;
                
                // dBFS計算（-60dBFS ～ 0dBFS の範囲）
                const dbfs = 20 * Math.log10(rms);
                return Math.max(-60, Math.min(0, dbfs));
            }
            
            // 個別音源のdB表示更新
            function updateSoundDBDisplay(soundName, dbValue) {
                const dbElement = dbDisplayElements.get(soundName);
                if (!dbElement) return;
                
                if (dbValue !== null) {
                    // dB値を整数で表示（-∞ の場合は特別処理）
                    if (dbValue <= -60) {
                        dbElement.textContent = '-∞';
                    } else {
                        dbElement.textContent = Math.round(dbValue) + 'dB';
                    }
                } else {
                    dbElement.textContent = '-∞';
                }
            }
            
            // 個別音源の波形描画
            function drawMiniWave(soundName) {
                const soundInstance = activeSounds.get(soundName);
                const canvasData = miniWaveCanvases.get(soundName);
                const style = waveStyles[soundName];
                
                if (!soundInstance || !canvasData || !style) return;
                
                const { analyser } = soundInstance;
                const { ctx, dataArray, width, height } = canvasData;
                
                // 周波数データを取得
                analyser.getByteFrequencyData(dataArray);
                
                // キャンバスクリア
                ctx.clearRect(0, 0, width, height);
                
                // 音源特性に応じた描画
                switch (style.type) {
                    case 'bars':
                        drawBars(ctx, dataArray, width, height, style);
                        break;
                    case 'curve':
                        drawCurve(ctx, dataArray, width, height, style);
                        break;
                    case 'spikes':
                        drawSpikes(ctx, dataArray, width, height, style);
                        break;
                    case 'dots':
                        drawDots(ctx, dataArray, width, height, style);
                        break;
                }
                
                // dB値の計算と表示
                const dbValue = calculateSoundDB(soundName);
                updateSoundDBDisplay(soundName, dbValue);
            }
            
            // バー形式の波形描画（話し声・交通騒音）
            function drawBars(ctx, dataArray, width, height, style) {
                const barCount = 12;
                const barWidth = width / barCount;
                const step = Math.floor(dataArray.length / barCount);
                
                ctx.fillStyle = style.color;
                
                for (let i = 0; i < barCount; i++) {
                    let value = 0;
                    for (let j = 0; j < step; j++) {
                        value += dataArray[i * step + j];
                    }
                    value = (value / step / 255) * style.intensity;
                    
                    const barHeight = value * height * 0.8;
                    const x = i * barWidth + barWidth * 0.2;
                    const y = height - barHeight;
                    
                    ctx.globalAlpha = 0.6 + value * 0.4;
                    ctx.fillRect(x, y, barWidth * 0.6, barHeight);
                }
                ctx.globalAlpha = 1;
            }
            
            // カーブ形式の波形描画（テレビ・洗濯機）
            function drawCurve(ctx, dataArray, width, height, style) {
                const points = 20;
                const step = Math.floor(dataArray.length / points);
                
                ctx.strokeStyle = style.color;
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = 0.8;
                
                ctx.beginPath();
                for (let i = 0; i < points; i++) {
                    let value = 0;
                    for (let j = 0; j < step; j++) {
                        value += dataArray[i * step + j];
                    }
                    value = (value / step / 255) * style.intensity;
                    
                    const x = (i / (points - 1)) * width;
                    const y = height * 0.5 + (value - 0.5) * height * 0.6;
                    
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
            
            // スパイク形式の波形描画（工事音）
            function drawSpikes(ctx, dataArray, width, height, style) {
                const spikeCount = 16;
                const spikeWidth = width / spikeCount;
                const step = Math.floor(dataArray.length / spikeCount);
                
                ctx.strokeStyle = style.color;
                ctx.lineWidth = 2;
                
                for (let i = 0; i < spikeCount; i++) {
                    let value = dataArray[i * step] / 255 * style.intensity;
                    
                    const x = i * spikeWidth + spikeWidth * 0.5;
                    const spikeHeight = value * height * 0.9;
                    
                    ctx.globalAlpha = 0.5 + value * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(x, height);
                    ctx.lineTo(x, height - spikeHeight);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
            }
            
            // ドット形式の波形描画（雨音）
            function drawDots(ctx, dataArray, width, height, style) {
                const dotCount = 24;
                const step = Math.floor(dataArray.length / dotCount);
                
                ctx.fillStyle = style.color;
                
                for (let i = 0; i < dotCount; i++) {
                    let value = dataArray[i * step] / 255 * style.intensity;
                    
                    const x = (i / dotCount) * width + Math.random() * 3 - 1.5;
                    const y = height * 0.2 + value * height * 0.6 + Math.random() * 2 - 1;
                    const radius = 0.5 + value * 1.5;
                    
                    ctx.globalAlpha = 0.4 + value * 0.6;
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // タッチ効果とリップル効果の統合管理
            function addTouchEffects(btn) {
                let touchTimeout = null;
                
                // タッチ開始時（リップル効果付き）
                function handleTouchStart(e) {
                    // 重複防止
                    if (touchTimeout) clearTimeout(touchTimeout);
                    
                    // 即座にタッチ状態適用
                    btn.classList.add('touching');
                    
                    // リップル効果を作成
                    createRipple(btn, e);
                    
                    // バックアップタイムアウト（稀にtouchendが発火しない場合の対策）
                    touchTimeout = setTimeout(() => {
                        btn.classList.remove('touching');
                    }, 300);
                }
                
                // タッチ終了時
                function handleTouchEnd(e) {
                    if (touchTimeout) {
                        clearTimeout(touchTimeout);
                        touchTimeout = null;
                    }
                    btn.classList.remove('touching');
                }
                
                // マウスダウン時（デスクトップ対応）
                function handleMouseDown(e) {
                    if (!('ontouchstart' in window)) { // タッチデバイスでない場合のみ
                        btn.classList.add('touching');
                        // デスクトップでもリップル効果
                        createRipple(btn, e);
                    }
                }
                
                // マウスアップ・マウスリーブ時
                function handleMouseUp(e) {
                    btn.classList.remove('touching');
                }
                
                // イベントリスナー追加（passive オプションでスクロール性能向上）
                btn.addEventListener('touchstart', handleTouchStart, { passive: true });
                btn.addEventListener('touchend', handleTouchEnd, { passive: true });
                btn.addEventListener('touchcancel', handleTouchEnd, { passive: true });
                
                btn.addEventListener('mousedown', handleMouseDown);
                btn.addEventListener('mouseup', handleMouseUp);
                btn.addEventListener('mouseleave', handleMouseUp);
                
                // クリーンアップ関数を返す
                return () => {
                    if (touchTimeout) clearTimeout(touchTimeout);
                    btn.removeEventListener('touchstart', handleTouchStart);
                    btn.removeEventListener('touchend', handleTouchEnd);
                    btn.removeEventListener('touchcancel', handleTouchEnd);
                    btn.removeEventListener('mousedown', handleMouseDown);
                    btn.removeEventListener('mouseup', handleMouseUp);
                    btn.removeEventListener('mouseleave', handleMouseUp);
                };
            }

            // UIイベント処理（複数音源同時再生対応）
            const btns = Array.from(document.querySelectorAll(".sound-btn"));
            btns.forEach((btn) => {
                // タッチ効果を追加
                addTouchEffects(btn);
                
                btn.addEventListener("click", async () => {
                    const kind = btn.dataset.sound;
                    const isActive = btn.classList.contains("is-active");
                    
                    if (isActive) {
                        // 再生中の音源を停止
                        stopSound(kind);
                        btn.classList.remove("is-active");
                        btn.setAttribute("aria-pressed", "false");
                        // 色をリセット
                        btn.style.setProperty('--dynamic-glow-opacity', '0');
                        // オーラ効果を無効化
                        updateAuraEffect(kind, false);
                        // 継続波紋を停止
                        stopContinuousRipples(kind);
                    } else {
                        // 新しい音源を開始
                        try {
                            const success = await startSound(kind);
                            if (success) {
                                btn.classList.add("is-active");
                                btn.setAttribute("aria-pressed", "true");
                                // 初期グロー設定
                                btn.style.setProperty('--dynamic-glow-opacity', '0.3');
                                // オーラ効果を有効化
                                updateAuraEffect(kind, true);
                                // 継続波紋を開始
                                startContinuousRipples(kind);
                            }
                        } catch (error) {
                            console.error('音声再生エラー:', error);
                            btn.classList.remove("is-active");
                            btn.setAttribute("aria-pressed", "false");
                            btn.style.setProperty('--dynamic-glow-opacity', '0');
                            updateAuraEffect(kind, false);
                            stopContinuousRipples(kind);
                            alert('音声の再生に失敗しました。ブラウザのコンソールで詳細を確認してください。');
                        }
                    }
                });
            });

            // メインスペクトラム表示は削除（ボタン内波形のみ残す）

            function draw() {
                requestAnimationFrame(draw);
                if (!analyser) return;

                // 動的色変化の更新
                updateButtonColors();
                
                // 個別音源の波形描画
                activeSounds.forEach((soundInstance, soundName) => {
                    drawMiniWave(soundName);
                });
            }
            draw();

            // Output device selection
            const connectBtn = document.getElementById("connectBtn");
            const btDot = document.getElementById("btDot");
            const btLabel = document.getElementById("btLabel");

            async function connectSpeaker() {
                ensureAudio();
                try {
                    if (
                        navigator.mediaDevices &&
                        "selectAudioOutput" in navigator.mediaDevices
                    ) {
                        const device =
                            await navigator.mediaDevices.selectAudioOutput();
                        if (device && device.deviceId && mediaOutEl.setSinkId) {
                            await mediaOutEl.setSinkId(device.deviceId);
                            setBtStatus(
                                true,
                                device.label || "出力デバイス選択済み",
                            );
                            return;
                        }
                    }
                    if (mediaOutEl.setSinkId) {
                        await mediaOutEl.setSinkId("default");
                        setBtStatus(true, "既定の出力に設定しました");
                    } else {
                        setBtStatus(false, "出力先選択は非対応");
                        alert(
                            "このブラウザでは出力デバイスの直接選択に未対応です。OSのBluetooth設定またはブラウザの音声出力設定からスピーカーを選択してください。",
                        );
                    }
                } catch (e) {
                    console.error(e);
                    setBtStatus(false, "接続に失敗");
                    alert(
                        "出力デバイスの選択に失敗しました。権限や接続状態をご確認ください。",
                    );
                }
            }
            function setBtStatus(connected, tip) {
                btDot.classList.toggle("ok", connected);
                btDot.classList.toggle("ng", !connected);
                btLabel.textContent = connected ? "接続済み" : "未接続";
                const chip = btLabel.closest(".bt-chip");
                if (chip)
                    chip.title =
                        tip ||
                        (connected
                            ? "音声出力がスピーカーに設定されました"
                            : "対応ブラウザで出力デバイスを選択できます");
            }
            connectBtn.addEventListener("click", connectSpeaker);

            window.addEventListener("pagehide", () => {
                stopSound(); // 全音源停止
                // 全継続波紋を停止
                continuousRipples.forEach((intervalId, soundName) => {
                    clearInterval(intervalId);
                });
                continuousRipples.clear();
            });

            // ページ読み込み時に音声ファイルをプリロード
            window.addEventListener("DOMContentLoaded", () => {
                // ミニ波形キャンバスの初期化
                initAllMiniWaveCanvases();
                
                // dB表示要素の初期化
                initDBDisplayElements();
                
                // バックグラウンドで音声ファイルを読み込む（エラーは無視）
                preloadAudioFiles().catch(error => {
                    console.warn('音声ファイルのプリロードに一部失敗しました:', error);
                });
            });
        </script>
    </body>
</html>
